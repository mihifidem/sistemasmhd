{% extends 'base.html' %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
<!-- Contenido detallado -->
{% if product.content %}
<section class="mx-auto max-w-5xl px-6 py-16">
    <div class="product-content">
        {{ product.content|safe }}
    </div>
</section>
{% endif %}

<!-- Volver al catálogo -->
<div class="mx-auto max-w-5xl px-6 pb-16">
    <a href="{% url 'core:home' %}" class="inline-flex items-center gap-2 text-sm text-slate-400 transition hover:text-cyan">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Volver al inicio
    </a>
</div>
{% endblock %}

{% block extra_head %}
<style>
/* ── Estilos del contenido HTML libre del producto ── */
.product-content {
    color: #cbd5e1; /* slate-300 */
    line-height: 1.8;
    font-size: 1rem;
}
.product-content h2 {
    font-size: 1.875rem;
    font-weight: 700;
    color: #fff;
    margin-top: 3rem;
    margin-bottom: 1rem;
    border-left: 4px solid #00e5ff;
    padding-left: 1rem;
}
.product-content h3 {
    font-size: 1.25rem;
    font-weight: 600;
    color: #f1f5f9;
    margin-top: 2rem;
    margin-bottom: 0.75rem;
}
.product-content p {
    margin-bottom: 1.25rem;
}
.product-content ul, .product-content ol {
    padding-left: 1.5rem;
    margin-bottom: 1.25rem;
}
.product-content ul { list-style: disc; }
.product-content ol { list-style: decimal; }
.product-content li { margin-bottom: 0.4rem; }
.product-content strong { color: #fff; font-weight: 600; }
.product-content a { color: #00e5ff; text-decoration: underline; }
.product-content a:hover { opacity: 0.8; }
.product-content img {
    max-width: 100%;
    border-radius: 1rem;
    margin: 1.5rem auto;
    display: block;
}
.product-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 0.9rem;
}
.product-content th {
    background: rgba(0,229,255,.1);
    color: #00e5ff;
    text-align: left;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,.1);
}
.product-content td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,.06);
}
.product-content tr:hover td { background: rgba(255,255,255,.03); }
.product-content blockquote {
    border-left: 4px solid #00e5ff;
    padding: 0.75rem 1.25rem;
    background: rgba(0,229,255,.06);
    border-radius: 0 0.75rem 0.75rem 0;
    margin: 1.5rem 0;
    color: #94a3b8;
    font-style: italic;
}
.product-content .highlight-box {
    background: rgba(0,229,255,.07);
    border: 1px solid rgba(0,229,255,.2);
    border-radius: 1rem;
    padding: 1.5rem 2rem;
    margin: 2rem 0;
}
.product-content .grid-2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.25rem;
    margin: 2rem 0;
}
.product-content .card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 1rem;
    padding: 1.25rem 1.5rem;
}
</style>
{% endblock %}
