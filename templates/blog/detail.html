{% extends 'base.html' %}

{% block title %}{{ post.meta_title|default:post.title }}{% endblock %}

{% block content %}
<article class="mx-auto max-w-4xl px-6 py-16">
    <div class="flex items-center gap-3">
        <p class="text-sm uppercase tracking-[0.3em] text-cyan">Blog article</p>
        {% if post.distributors_only %}
        <span class="rounded-full bg-cyan/15 px-3 py-1 text-xs font-medium text-cyan">Solo distribuidores</span>
        {% endif %}
    </div>
    <h1 class="mt-4 text-5xl font-semibold text-white">{{ post.title }}</h1>
    <p class="mt-4 text-sm text-slate-400">{{ post.publish_date|date:'d M Y' }}</p>
    <div class="prose prose-invert mt-10 max-w-none text-slate-300">
        {{ post.content|linebreaks }}
    </div>
</article>
{% endblock %}
