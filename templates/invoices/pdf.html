<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ invoice.invoice_number }}</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; color: #0f172a; }
        .header { margin-bottom: 24px; }
        .row { margin-bottom: 12px; }
        .label { color: #64748b; font-size: 12px; }
        .value { font-size: 14px; }
        .total { margin-top: 24px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ invoice.invoice_number }}</h1>
        <p>MHD Platform</p>
    </div>
    <div class="row"><span class="label">Distributor:</span> <span class="value">{{ invoice.order.distributor.company_name }}</span></div>
    <div class="row"><span class="label">Issue date:</span> <span class="value">{{ invoice.issue_date }}</span></div>
    <div class="row"><span class="label">Due date:</span> <span class="value">{{ invoice.due_date }}</span></div>
    <div class="row"><span class="label">Payment method:</span> <span class="value">{{ invoice.payment_method }}</span></div>
    <div class="total">Amount: {{ invoice.amount }} EUR</div>
</body>
</html>
