{% extends 'base.html' %}

{% block title %}Acceso técnicos{% endblock %}

{% block content %}
<section class="mx-auto max-w-xl px-6 py-16">
    <div class="rounded-[2rem] border border-white/10 bg-white/5 p-8 backdrop-blur-xl">
        <p class="text-xs uppercase tracking-[0.3em] text-cyan">Panel técnico</p>
        <h1 class="mt-3 text-3xl font-semibold text-white">Acceso a recursos técnicos</h1>
        <p class="mt-2 text-sm text-slate-300">Introduce el usuario y contraseña compartidos definidos por tu gerente/distribuidor.</p>

        {% if error %}
        <div class="mt-5 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300">{{ error }}</div>
        {% endif %}

        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            <div>
                <label class="mb-1.5 block text-sm text-slate-300">Usuario</label>
                <input type="text" name="username" required autocomplete="username"
                    class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-cyan focus:outline-none">
            </div>
            <div>
                <label class="mb-1.5 block text-sm text-slate-300">Contraseña</label>
                <input type="password" name="password" required autocomplete="current-password"
                    class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-cyan focus:outline-none">
            </div>
            <button type="submit" class="w-full rounded-full bg-cyan px-6 py-3 text-sm font-semibold text-slate-950 transition hover:-translate-y-0.5 hover:shadow-glow">
                Entrar al panel técnico
            </button>
        </form>
    </div>
</section>
{% endblock %}
